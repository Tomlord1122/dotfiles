# mouse mode
set -g mouse on

set -g focus-events on
set -g set-clipboard on
# True color support for Ghostty
set -g default-terminal "xterm-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Increase scrollback buffer
set -g history-limit 10000

# Reduce escape time (better for vim/neovim)
set -sg escape-time 10

# load config
if-shell "test -f ~/.tmux-status.conf" "source ~/.tmux-status.conf"

# vim-like bindings for copy and paste
set-window-option -g mode-keys vi

# v to go into visual mode
bind-key -T copy-mode-vi 'v' send-keys -X begin-selection
# y to yank (copy to tmux buffer and the best clipboard tool available)
set -g @clipboard_copy_command ''
if-shell 'command -v pbcopy >/dev/null 2>&1' 'set -g @clipboard_copy_command "pbcopy"'
if-shell 'command -v wl-copy >/dev/null 2>&1' 'set -g @clipboard_copy_command "wl-copy"'
if-shell 'command -v xclip >/dev/null 2>&1' 'set -g @clipboard_copy_command "xclip -selection clipboard"'
if-shell 'command -v xsel >/dev/null 2>&1' 'set -g @clipboard_copy_command "xsel --clipboard --input"'
bind-key -T copy-mode-vi 'y' if-shell '[ -n "#{@clipboard_copy_command}" ]' 'send-keys -X copy-pipe-and-cancel "#{@clipboard_copy_command}"' 'send-keys -X copy-selection-and-cancel'
# C-x + p to paste
bind-key p paste-buffer

# Easier split panes (use | and -)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# New window keeps current path
bind c new-window -c "#{pane_current_path}"

# --- TPM Plugins ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'   # Save/restore sessions
set -g @plugin 'tmux-plugins/tmux-continuum'    # Auto-save sessions

# tmux-resurrect settings
set -g @resurrect-capture-pane-contents 'on'

# tmux-continuum settings (auto-save every 15 min, auto-restore on tmux start)
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Initialize TPM (keep this line at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
